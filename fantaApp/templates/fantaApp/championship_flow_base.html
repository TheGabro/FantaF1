{% extends "fantaApp/base.html" %}

{% block content %}
<div style="position: sticky; top: 0; background: #f0f0f0; padding: 10px 12px; border-bottom: 1px solid #ddd; z-index: 10;">
  <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px;">
    <div style="font-weight: 600;">
      {% block championship_banner_link %}
      <a href="{% url 'championship_dashboard' championship.id %}" style="text-decoration: none; color: inherit; font-weight: 600;">
        {{ championship.name }} {{ championship.year }}
      </a>
      {% endblock %}
    </div>
    <a href="{% url 'home' %}" style="text-decoration: none;">Homepage</a>
  </div>
</div>

<div style="margin-top: 12px;">
  {% block championship_content %}{% endblock %}
</div>
{% endblock %}
